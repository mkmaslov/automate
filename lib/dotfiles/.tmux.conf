# KEYBINDINGS

# Easier prefix (Ctrl+a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vim-like pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Better splits
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

#------------------------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

##### Popup helpers
bind p display-popup -E -w 80% -h 80% "bash"
bind ? display-popup -E -w 90% -h 90% "tmux list-keys | less"

# Mouse support: click/select/resize/scroll
set -g mouse on
# Large scrollback per pane
set -g history-limit 100000
# Copy to system clipboard when terminal supports it
set -g set-clipboard on
# Keep window numbering compact after closes
set -g renumber-windows on
# Start window numbers at 1
set -g base-index 1
# Start pane numbers at 1
setw -g pane-base-index 1
# No Esc delay; better for Vim/Neovim
set -g escape-time 0
# Let apps receive focus gained/lost events
set -g focus-events on
# Terminal colors
set -g default-terminal 'tmux-256color'
set -as terminal-features ',*:RGB'

#------------------------------------------------------------------------------

# PLUGINS

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Color theme
set -g @plugin 'idossha/tmux-nightfox'
set -g @tmux-nightfox 'carbonfox'

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Restore sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Better UI
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'jaclu/tmux-menus'
# Change trigger key from Prefix + \ to Prefix + Space
set -g @menus_trigger 'Space'

run '~/.tmux/plugins/tpm/tpm'

#------------------------------------------------------------------------------